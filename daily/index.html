<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
<meta name="googlebot" content="noindex, nofollow" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>쿠팡 판매 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F7F8FA; --surface:#FFFFFF; --surface-2:#FBFBFD;
    --border:#ECEEF2; --border-2:#E4E7EC;
    --text-1:#0F172A; --text-2:#475569; --text-3:#94A3B8;
    --accent:#4F46E5; --accent-soft:#EEF2FF;
    --success:#10B981; --success-soft:#ECFDF5;
    --danger:#EF4444; --danger-soft:#FEF2F2;
    --warning:#F59E0B; --warning-soft:#FEF3C7;
    --radius:14px; --radius-sm:8px;
    --shadow-sm:0 1px 2px rgba(15,23,42,.04);
    --shadow:0 4px 16px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Pretendard','Inter',-apple-system,system-ui,sans-serif;
    background:var(--bg); color:var(--text-1);
    font-size:13.5px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1600px; margin:0 auto; padding:28px 32px 60px 32px;}

  .header{display:flex; align-items:center; gap:14px; margin-bottom:18px;}

  /* Top tab bar */
  .tab-bar{display:flex; gap:6px; margin-bottom:18px; border-bottom:2px solid var(--border);}
  .tab-btn{
    padding:10px 22px; border:none; background:transparent;
    font-size:14px; font-weight:600; color:var(--text-3);
    cursor:pointer; font-family:inherit;
    border-bottom:3px solid transparent;
    margin-bottom:-2px;
    transition:all .12s;
  }
  .tab-btn:hover{color:var(--text-1);}
  .tab-btn.active{color:#1F2937; border-bottom-color:#1F2937;}
  .brand-logo-img{
    width:48px; height:48px; border-radius:12px;
    object-fit:cover;
    box-shadow:0 4px 14px rgba(15,23,42,.08);
    border:1px solid var(--border);
    background:white;
  }
  h1{margin:0; font-size:22px; font-weight:700; letter-spacing:-0.02em;}
  .sub{font-size:12.5px; color:var(--text-3); margin-top:3px;}

  .table-card{
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); box-shadow:var(--shadow-sm); overflow:visible;
  }
  .table-header{
    display:flex; align-items:center; padding:16px 20px;
    border-bottom:1px solid var(--border); gap:12px; flex-wrap:wrap;
  }
  .table-title{font-size:15px; font-weight:700; letter-spacing:-0.01em;}
  .table-sub{font-size:12px; color:var(--text-3); margin-top:2px;}

  /* Search with autocomplete dropdown */
  .search-wrap{margin-left:auto; position:relative; min-width:280px;}
  .search-input{
    width:100%; padding:8px 12px; border:1px solid var(--border);
    border-radius:8px; font-size:12.5px; outline:none;
    font-family:inherit; background:var(--surface-2);
    transition:all .15s;
  }
  .search-input:focus{border-color:var(--accent); background:var(--surface); box-shadow:0 0 0 3px var(--accent-soft);}
  .search-drop{
    position:absolute; top:calc(100% + 4px); left:0; right:0;
    background:var(--surface); border:1px solid var(--border-2);
    border-radius:8px; box-shadow:var(--shadow);
    max-height:320px; overflow-y:auto; z-index:50; display:none;
  }
  .search-drop.show{display:block;}
  .search-opt{
    padding:8px 12px; cursor:pointer; font-size:12.5px;
    border-bottom:1px solid var(--border);
    display:flex; gap:10px; align-items:baseline;
  }
  .search-opt:last-child{border-bottom:none;}
  .search-opt:hover, .search-opt.active{background:var(--accent-soft);}
  .search-opt .id{font-weight:600; color:var(--accent); min-width:70px;}
  .search-opt .nm{color:var(--text-1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* Category buttons */
  .cat-bar{
    padding:14px 20px; border-bottom:1px solid var(--border);
    display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    background:var(--surface-2);
  }
  .cat-bar-label{font-size:11.5px; color:var(--text-3); font-weight:600; margin-right:4px; text-transform:uppercase; letter-spacing:.04em;}
  .cat-btn{
    padding:6px 12px; border-radius:999px; border:1px solid var(--border-2);
    background:var(--surface); color:var(--text-2); font-size:12.5px;
    font-weight:500; cursor:pointer; font-family:inherit;
    transition:all .12s;
  }
  .cat-btn:hover{border-color:var(--accent); color:var(--accent);}
  .cat-btn.active{background:#1F2937; color:white; border-color:#1F2937;}
  .cat-btn .cnt{opacity:.7; margin-left:4px; font-weight:400;}

  /* Date pagination controls */
  .date-controls{
    padding:10px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
    background:var(--surface);
  }
  .date-controls .label{font-size:12px; color:var(--text-2); font-weight:500;}
  .date-controls .range{font-size:12.5px; color:var(--text-1); font-weight:600; font-variant-numeric:tabular-nums;}
  .nav-btn{
    width:30px; height:30px; border-radius:8px;
    border:1px solid var(--border-2); background:var(--surface);
    cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
    color:var(--text-2); font-size:14px; font-weight:600;
    transition:all .12s; font-family:inherit;
  }
  .nav-btn:hover:not(:disabled){border-color:var(--accent); color:var(--accent); background:var(--accent-soft);}
  .nav-btn:disabled{opacity:.35; cursor:not-allowed;}
  .date-mode-btn{
    padding:6px 14px; border-radius:8px;
    border:1px solid var(--border-2); background:var(--surface);
    color:var(--text-2); font-size:12.5px; font-weight:500;
    cursor:pointer; font-family:inherit; transition:all .12s;
  }
  .date-mode-btn:hover{border-color:var(--accent); color:var(--accent);}
  .date-mode-btn.active{background:#1F2937; color:white; border-color:#1F2937;}
  .custom-range{display:inline-flex; align-items:center; gap:6px;}
  .date-input{
    padding:5px 8px; border:1px solid var(--border-2); border-radius:6px;
    font-size:12px; font-family:inherit; background:var(--surface); color:var(--text-1);
  }
  .date-input:focus{outline:none; border-color:var(--accent);}

  .scroll{overflow-x:scroll; overflow-y:auto; max-height:720px;}
  .scroll::-webkit-scrollbar{height:18px; width:14px;}
  .scroll::-webkit-scrollbar-corner{background:#F1F3F5;}
  .scroll::-webkit-scrollbar-track{background:#F1F3F5; border-top:1px solid var(--border);}
  .scroll::-webkit-scrollbar-thumb{
    background:#B8BEC8; border-radius:9px;
    border:3px solid #F1F3F5;
    min-width:60px;
  }
  .scroll::-webkit-scrollbar-thumb:hover{background:#B8BEC8;}
  .scroll::-webkit-scrollbar-button:single-button{
    background:#F1F3F5; height:18px; width:18px;
    display:block; background-size:8px; background-repeat:no-repeat; background-position:center;
  }
  .scroll::-webkit-scrollbar-button:horizontal:decrement{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'><path d='M5.5 1L2 4l3.5 3' stroke='%23475569' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
  }
  .scroll::-webkit-scrollbar-button:horizontal:increment{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'><path d='M2.5 1L6 4l-3.5 3' stroke='%23475569' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
  }
  table{width:100%; border-collapse:collapse; min-width:1300px;}
  thead th.day-col, tbody td.day-cell{min-width:56px;}

  /* 좌측 6개 컬럼 고정 (가로 스크롤 시) */
  .sticky-col{position:sticky; background:var(--surface); z-index:2;}
  thead th.sticky-col{background:var(--surface-2); z-index:3;}
  .sku-row:hover .sticky-col, .sku-row.expanded .sticky-col{background:#F1F3F5;}
  .sticky-col.last-fixed{box-shadow:6px 0 6px -4px rgba(15,23,42,.12);}
  thead th{
    background:var(--surface-2); position:sticky; top:0; z-index:1;
    text-align:right; font-size:11px; font-weight:600;
    color:var(--text-3); text-transform:uppercase; letter-spacing:.04em;
    padding:11px 12px; border-bottom:1px solid var(--border);
    white-space:nowrap;
  }
  thead th.left{text-align:left;}
  thead th.center{text-align:center;}
  tbody td{
    padding:13px 12px; font-size:13px;
    border-bottom:1px solid var(--border);
    text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap;
  }
  tbody td.left{text-align:left;}
  tbody td.center{text-align:center;}
  .sku-row{cursor:pointer; transition:background .12s;}
  .sku-row:hover{background:#F1F3F5;}
  .sku-row.expanded{background:#F1F3F5;}
  .sku-id{font-weight:600; color:#1F2937; font-size:12.5px;}
  .sku-name{
    font-weight:500; color:var(--text-1);
    max-width:340px; overflow:hidden; text-overflow:ellipsis;
    display:inline-block; vertical-align:middle;
  }
  .chev{
    display:inline-block; width:14px; transition:transform .2s;
    color:var(--text-3); margin-right:4px;
  }
  .sku-row.expanded .chev{transform:rotate(90deg); color:var(--accent);}
  .day-cell{color:var(--text-2); font-size:12.5px;}
  .day-cell.zero{color:var(--text-3); opacity:.5;}
  .day-cell.latest{font-weight:600; color:var(--text-1);}
  .total-cell{font-weight:700; color:var(--text-1);}
  .revenue-cell{font-weight:700; color:#0F766E;}
  .avg-cell{font-weight:600;}

  .detail-row{display:none;}
  .detail-row.show{display:table-row;}
  .detail-row td{padding:0; background:var(--surface-2);}
  .detail-inner{
    padding:20px 24px; border-bottom:1px solid var(--border);
    display:grid; grid-template-columns:repeat(4,1fr); gap:16px;
  }
  .detail-item{
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:14px 16px;
  }
  .detail-label{
    font-size:11px; color:var(--text-3); font-weight:600;
    text-transform:uppercase; letter-spacing:.04em;
  }
  .detail-value{
    font-size:17px; font-weight:700; margin-top:6px;
    color:var(--text-1); font-variant-numeric:tabular-nums;
    letter-spacing:-0.01em;
  }
  .detail-value.empty{color:var(--text-3); font-weight:500; font-size:14px;}

  .empty-state{padding:60px 20px; text-align:center; color:var(--text-3);}
  .empty-state .ico{font-size:38px; margin-bottom:10px; opacity:.4;}
  .empty-state h3{margin:0 0 6px 0; font-size:15px; color:var(--text-2); font-weight:600;}
  .empty-state p{margin:0; font-size:13px;}

  .stock-pill{
    display:inline-block;
    padding:2px 8px; border-radius:6px;
    border:1px solid #F1F3F5;
    font-weight:600; font-variant-numeric:tabular-nums;
    color:var(--text-1);
  }
  .stock-pill.danger{
    color:var(--danger);
    background:var(--danger-soft);
    border-color:#FECACA;
  }

  @media(max-width:1100px){
    .detail-inner{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <h1>쿠팡 판매 대시보드</h1>
    </div>
  </div>

  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="out">출고</button>
    <button class="tab-btn" data-tab="in">입고</button>
    <button class="tab-btn" data-tab="ad">광고</button>
  </div>

  <div class="table-card">
    <div class="table-header">
      <div>
        <div class="table-title">SKU별 판매 현황</div>
      </div>
      <div class="search-wrap">
        <input class="search-input" id="searchInput" placeholder="SKU ID 또는 SKU명 검색..." autocomplete="off" />
        <div class="search-drop" id="searchDrop"></div>
      </div>
    </div>

    <div class="cat-bar" id="catBar">
      <span class="cat-bar-label">카테고리</span>
    </div>
    <div class="cat-bar" id="brandBar">
      <span class="cat-bar-label">브랜드</span>
    </div>

    <div class="date-controls">
      <span class="label">날짜 보기</span>
      <button class="date-mode-btn active" data-mode="7">7일</button>
      <button class="date-mode-btn" data-mode="14">14일</button>
      <button class="date-mode-btn" data-mode="custom">직접선택</button>
      <span class="custom-range" id="customRange" style="display:none;">
        <input type="date" id="customStart" class="date-input" />
        <span style="color:var(--text-3);">~</span>
        <input type="date" id="customEnd" class="date-input" />
      </span>
      <span class="range" id="dateRangeLabel" style="margin-left:auto;">—</span>
    </div>

    <div class="scroll">
      <table id="mainTable">
        <thead><tr id="mainHead">
          <th class="left">SKU ID</th>
          <th class="left">SKU 명</th>
          <th>현재고</th>
          <th>판매가능일수</th>
          <th>14일 평균</th>
          <th>7일 평균</th>
          <th>월 총판매</th>
        </tr></thead>
        <tbody id="mainBody">
          <tr><td colspan="8">
            <div class="empty-state">
              <div class="ico">📦</div>
              <h3>데이터 로딩 중...</h3>
              <p>잠시만 기다려주세요.</p>
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const EXCLUDE_PREFIXES = ['삼대오백','MEXXIVE','바이퍼','뉴트리커먼','매시브','MXSSIVE'];
const VAT_RATE = 0.10;

const state = {
  tab:'out',
  dpText:null, boText:null,
  dp:[], bo:[], skuMap:new Map(),
  allDays:[],       // 전체 날짜 (오름차순, YYYYMMDD)
  dateMode:'7',     // 출고 기본 7, 입고 기본 14 (탭 전환 시 자동)
  customStart:'', customEnd:'',  // YYYYMMDD
  monthRange:'',
  category:'all',
  brand:'all',
  catCounts:{},
  brandCounts:{},
  supplyMap:{},
};
const BRAND_OPTIONS = ['오아','보아르'];

function ymdToISO(y){ return `${y.slice(0,4)}-${y.slice(4,6)}-${y.slice(6,8)}`; }
function isoToYmd(iso){ return iso.replace(/-/g,''); }

function parseCSV(text){
  const rows=[]; let row=[]; let cur=''; let inQ=false;
  text = text.replace(/^﻿/, '');
  for (let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"'; i++;} else inQ=false; }
      else cur+=c;
    } else {
      if(c==='"') inQ=true;
      else if(c===','){row.push(cur); cur='';}
      else if(c==='\n'){row.push(cur); rows.push(row); row=[]; cur='';}
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur.length||row.length){row.push(cur); rows.push(row);}
  if(!rows.length) return [];
  const headers=rows[0];
  return rows.slice(1).filter(r=>r.length>1 && r.some(v=>v!=='')).map(r=>{
    const o={}; headers.forEach((h,i)=>o[h.trim()]=(r[i]||'').trim()); return o;
  });
}

function ymdToLabel(ymd){
  return `${parseInt(ymd.slice(4,6),10)}/${parseInt(ymd.slice(6,8),10)}`;
}
const fmt=n=>Number(n||0).toLocaleString('ko-KR');
const fmtKRW=n=>'₩'+Math.round(Number(n||0)).toLocaleString('ko-KR');
const num=v=>{const n=parseFloat(v); return isNaN(n)?0:n;};
function isExcluded(name){
  const s=String(name||'').trim();
  return EXCLUDE_PREFIXES.some(p=>s.startsWith(p));
}

function aggregate(){
  state.dp=parseCSV(state.dpText);
  state.bo=parseCSV(state.boText);

  // 전체 날짜 수집 — dp(판매) + bo(입고/재고) 둘 다 (오름차순)
  const dateSet=new Set();
  for(const r of state.dp){ if(r['날짜']) dateSet.add(r['날짜']); }
  for(const r of state.bo){ if(r['날짜']) dateSet.add(r['날짜']); }
  state.allDays=[...dateSet].sort();
  if(state.allDays.length===0) return;

  const maxYmd=state.allDays[state.allDays.length-1];
  const minYmd=state.allDays[0];
  state.monthRange=`${ymdToLabel(minYmd)} ~ ${ymdToLabel(maxYmd)} (${maxYmd.slice(0,4)})`;
  // 직접선택 초기값 = 전체 범위
  if(!state.customStart) state.customStart=minYmd;
  if(!state.customEnd) state.customEnd=maxYmd;

  // basic_operation: SKU별 최신 날짜 찾기 → 그 날짜의 모든 센터(FC/VF107 등) 재고 합산
  const latestDate=new Map();
  for(const r of state.bo){
    const id=r['SKU ID']; if(!id) continue;
    const d=r['날짜']; if(!d) continue;
    if(!latestDate.has(id)||d>latestDate.get(id)) latestDate.set(id,d);
  }
  const boMap=new Map();
  for(const r of state.bo){
    const id=r['SKU ID']; if(!id) continue;
    if(r['날짜']!==latestDate.get(id)) continue;
    const prev=boMap.get(id);
    if(!prev){
      const o=Object.assign({},r);
      o['현재재고수량']=num(r['현재재고수량']);
      o['입고수량']=num(r['입고수량']);
      boMap.set(id,o);
    } else {
      prev['현재재고수량']+=num(r['현재재고수량']);
      prev['입고수량']=(prev['입고수량']||0)+num(r['입고수량']);
      // 한 센터라도 정상이면 정상 처리
      const cur=(prev['발주가능상태']||'').trim();
      const nw=(r['발주가능상태']||'').trim();
      if((cur==='발주불가'||cur==='일시중단') && nw!=='발주불가' && nw!=='일시중단') prev['발주가능상태']=nw;
    }
  }
  // 합산 후 발주가능상태가 '발주불가'/'일시중단'이면 표에서 제외
  for(const [id,r] of [...boMap]){
    const status=(r['발주가능상태']||'').trim();
    if(status==='발주불가'||status==='일시중단') boMap.delete(id);
  }

  const skuMap=new Map();
  for(const r of state.dp){
    const id=r['SKU ID']; if(!id) continue;
    const nm=r['SKU 명']||'';
    if(isExcluded(nm)) continue;
    if(!skuMap.has(id)){
      skuMap.set(id,{
        sku_id:id, sku_name:nm,
        category:r['상품카테고리']||r['상품 카테고리']||'기타',
        sub_category:r['하위카테고리']||r['하위 카테고리']||'',
        daily_units:{}, daily_gmv:{}, daily_cogs:{},
        total_units:0, total_gmv:0, total_cogs:0,
        asp_sum:0, asp_cnt:0,
      });
    }
    const o=skuMap.get(id); const d=r['날짜'];
    const gmv=num(r['매출액(GMV)']);
    const cogs=num(r['매입원가(COGS)']);
    const asp=num(r['평균판매금액(ASP)']);
    o.daily_gmv[d]=(o.daily_gmv[d]||0)+gmv;
    o.daily_cogs[d]=(o.daily_cogs[d]||0)+cogs;
    o.total_gmv+=gmv; o.total_cogs+=cogs;
    if(asp>0){o.asp_sum+=asp; o.asp_cnt+=1;}
  }
  // 출고수량(판매수량)은 basic_operation에서 끌어옴 (센터별 합산)
  for(const r of state.bo){
    const id=r['SKU ID']; if(!id) continue;
    const nm=r['SKU 명']||'';
    if(isExcluded(nm)) continue;
    if(!skuMap.has(id)){
      skuMap.set(id,{sku_id:id, sku_name:nm,
        category:r['상품 카테고리']||r['상품카테고리']||'기타',
        sub_category:r['하위 카테고리']||r['하위카테고리']||'',
        brand:(r['브랜드']||'').trim(),
        daily_units:{},daily_gmv:{},daily_cogs:{},
        total_units:0,total_gmv:0,total_cogs:0,asp_sum:0,asp_cnt:0});
    }
    const o=skuMap.get(id); const d=r['날짜']; if(!d) continue;
    const out=num(r['출고수량']);
    o.daily_units[d]=(o.daily_units[d]||0)+out;
    o.total_units+=out;
  }

  // basic_operation에 없는 SKU는 단종으로 간주 — 표에서 제외
  for(const id of [...skuMap.keys()]){
    if(!boMap.has(id)) skuMap.delete(id);
  }
  // basic_operation에만 있는 SKU (재고만, 판매 없음) → 추가
  for(const [id,bo] of boMap){
    const nm=bo['SKU 명']||'';
    if(isExcluded(nm)) continue;
    if(!skuMap.has(id)){
      skuMap.set(id,{sku_id:id, sku_name:nm,
        category:bo['상품 카테고리']||bo['상품카테고리']||'기타',
        sub_category:bo['하위 카테고리']||bo['하위카테고리']||'',
        brand:(bo['브랜드']||'').trim(),
        daily_units:{},daily_gmv:{},daily_cogs:{},
        total_units:0,total_gmv:0,total_cogs:0,asp_sum:0,asp_cnt:0});
    }
  }

  // 14일 평균 계산용
  const last14=state.allDays.slice(-14);
  for(const [id,o] of skuMap){
    const sum14=last14.reduce((s,d)=>s+(o.daily_units[d]||0),0);
    o.avg14=sum14/14;
    o.avg_asp=o.asp_cnt?(o.asp_sum/o.asp_cnt):0;
    o.avg_cogs_per_unit=o.total_units?(o.total_cogs/o.total_units):0;

    const bo=boMap.get(id);
    if(bo){
      o.stock=num(bo['현재재고수량']);
      o.inbound=num(bo['입고수량']);
      o.cogs_master=num(bo['매입원가']);
      o.brand=(bo['브랜드']||'').trim();
      if(!o.sku_name) o.sku_name=bo['SKU 명']||'';
      if(!o.category||o.category==='기타') o.category=bo['상품 카테고리']||bo['상품카테고리']||o.category;
    } else { o.stock=null; o.inbound=null; o.cogs_master=null; o.brand=''; }

    // 공급가 + 카테고리 + 판매상태 + 소비자가 (마진테이블)
    const m=state.supplyMap[id];
    o.supply_price=(m && typeof m==='object') ? (m.s||0) : (typeof m==='number' ? m : 0);
    const marginCat=(m && typeof m==='object') ? (m.c||'') : '';
    const marginStatus=(m && typeof m==='object') ? (m.st||'') : '';
    o.consumer_price=(m && typeof m==='object') ? (m.p||0) : 0;
    if(marginCat) o.category=marginCat;
    if(!o.category) o.category='기타';
    o.sale_status=marginStatus;
    o.total_revenue=o.supply_price ? Math.round(o.total_units*o.supply_price/(1+VAT_RATE)) : 0;
  }
  // 판매상태가 '단종'인 SKU 제외
  for(const [id,o] of [...skuMap]){
    if(o.sale_status && o.sale_status.indexOf('단종')>=0) skuMap.delete(id);
  }

  // 일별 입고수량 합산 (basic_operation 모든 행 → SKU/날짜별 합)
  for(const r of state.bo){
    const id=r['SKU ID']; if(!id) continue;
    if(!skuMap.has(id)) continue;
    const o=skuMap.get(id);
    const d=r['날짜']; if(!d) continue;
    const inb=num(r['입고수량']);
    if(!o.daily_inbound) o.daily_inbound={};
    o.daily_inbound[d]=(o.daily_inbound[d]||0)+inb;
    o.total_inbound=(o.total_inbound||0)+inb;
  }
  // 카테고리/브랜드 카운트
  const catCounts={}, brandCounts={};
  for(const [,o] of skuMap){
    const c=o.category||'기타';
    catCounts[c]=(catCounts[c]||0)+1;
    const b=(o.brand||'').trim();
    if(b) brandCounts[b]=(brandCounts[b]||0)+1;
  }
  state.catCounts=catCounts;
  state.brandCounts=brandCounts;
  state.skuMap=skuMap;
}

function getVisibleDays(){
  if(!state.allDays.length) return [];
  if(state.dateMode==='custom'){
    const s=state.customStart, e=state.customEnd;
    return state.allDays.filter(d=>d>=s && d<=e).map(k=>({key:k,label:ymdToLabel(k)}));
  }
  const n=state.dateMode==='14'?14:7;
  const end=state.allDays.length-1;
  const start=Math.max(0, end-n+1);
  return state.allDays.slice(start, end+1).map(k=>({key:k,label:ymdToLabel(k)}));
}

function renderCategoryBar(){
  const bar=document.getElementById('catBar');
  bar.innerHTML='<span class="cat-bar-label">카테고리</span>';
  const totalCnt=[...state.skuMap.values()].length;
  const cats=[['all','전체',totalCnt]];
  Object.entries(state.catCounts).sort((a,b)=>String(a[0]).localeCompare(String(b[0]),'ko')).forEach(([k,v])=>cats.push([k,k,v]));
  cats.forEach(([key,label,cnt])=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(state.category===key?' active':'');
    b.innerHTML=`${escHtml(label)}<span class="cnt">(${cnt})</span>`;
    b.onclick=()=>{ state.category=key; renderCategoryBar(); renderTable(); };
    bar.appendChild(b);
  });
}

function renderBrandBar(){
  const bar=document.getElementById('brandBar');
  bar.innerHTML='<span class="cat-bar-label">브랜드</span>';
  const totalCnt=[...state.skuMap.values()].length;
  const items=[['all','전체',totalCnt]];
  BRAND_OPTIONS.forEach(b=>{
    items.push([b,b, state.brandCounts[b]||0]);
  });
  items.forEach(([key,label,cnt])=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(state.brand===key?' active':'');
    b.innerHTML=`${escHtml(label)}<span class="cnt">(${cnt})</span>`;
    b.onclick=()=>{ state.brand=key; renderBrandBar(); renderTable(); };
    bar.appendChild(b);
  });
}

function render(){
  aggregate();
  renderCategoryBar();
  renderBrandBar();
  renderDateControls();
  renderTable();
  bindSearch();
}

function renderDateControls(){
  const days=getVisibleDays();
  const label=document.getElementById('dateRangeLabel');
  if(days.length){
    label.textContent=`${days[0].label} ~ ${days[days.length-1].label} (${days.length}일)`;
  } else label.textContent='—';
  document.querySelectorAll('.date-mode-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.mode===state.dateMode);
  });
  document.getElementById('customRange').style.display = state.dateMode==='custom' ? 'inline-flex' : 'none';
  if(state.dateMode==='custom'){
    const s=document.getElementById('customStart'), e=document.getElementById('customEnd');
    if(state.customStart) s.value=ymdToISO(state.customStart);
    if(state.customEnd) e.value=ymdToISO(state.customEnd);
    if(state.allDays.length){
      s.min=ymdToISO(state.allDays[0]); s.max=ymdToISO(state.allDays[state.allDays.length-1]);
      e.min=ymdToISO(state.allDays[0]); e.max=ymdToISO(state.allDays[state.allDays.length-1]);
    }
  }
}

function renderTable(){
  if(state.tab==='ad'){
    document.getElementById('mainHead').innerHTML='';
    document.getElementById('mainBody').innerHTML='<tr><td><div class="empty-state"><div class="ico">📣</div><h3>광고 데이터는 추후 추가 예정입니다</h3></div></td></tr>';
    return;
  }
  const days=getVisibleDays();
  const head=document.getElementById('mainHead');
  const isIn = state.tab==='in';
  if(isIn){
    head.innerHTML=`
      <th class="left">SKU ID</th>
      <th class="left">SKU 명</th>
      <th>현재고</th>
      ${days.map(d=>`<th class="center day-col">${d.label}</th>`).join('')}
      <th>월 총입고</th>
    `;
  } else {
    head.innerHTML=`
      <th class="left">SKU ID</th>
      <th class="left">SKU 명</th>
      <th>현재고</th>
      <th>판매가능일수</th>
      <th>14일 평균</th>
      <th>7일 평균</th>
      ${days.map(d=>`<th class="center day-col">${d.label}</th>`).join('')}
      <th>월 총판매</th>
    `;
  }

  let list=[...state.skuMap.values()];
  if(state.category!=='all'){
    list=list.filter(o=>(o.category||'기타')===state.category);
  }
  if(state.brand!=='all'){
    list=list.filter(o=>(o.brand||'')===state.brand);
  }
  const lastDay=state.allDays[state.allDays.length-1];
  if(isIn){
    // 가장 최근에 (전체 SKU 합쳐서) 입고가 발생한 날짜 찾기 — 그 날 기준으로 내림차순
    let refDay=lastDay;
    for(let i=state.allDays.length-1;i>=0;i--){
      const d=state.allDays[i];
      let sum=0;
      for(const o of list){ sum+=(o.daily_inbound&&o.daily_inbound[d])||0; if(sum>0)break; }
      if(sum>0){ refDay=d; break; }
    }
    list.sort((a,b)=>((b.daily_inbound&&b.daily_inbound[refDay])||0)-((a.daily_inbound&&a.daily_inbound[refDay])||0));
  } else {
    list.sort((a,b)=>(b.daily_units[lastDay]||0)-(a.daily_units[lastDay]||0));
  }

  const body=document.getElementById('mainBody');
  body.innerHTML='';
  const fixedCols = isIn ? 3 : 6;
  const tailCols = 1;
  const colCount=fixedCols+days.length+tailCols;

  if(list.length===0){
    body.innerHTML=`<tr><td colspan="${colCount}"><div class="empty-state"><div class="ico">📭</div><h3>표시할 SKU가 없습니다</h3><p>다른 카테고리를 선택해 주세요.</p></div></td></tr>`;
    return;
  }

  // window의 7일 평균
  const winKeys=days.map(d=>d.key);
  const winLen=winKeys.length||1;

  list.forEach(o=>{
    const tr=document.createElement('tr'); tr.className='sku-row'; tr.dataset.skuId=o.sku_id;
    let stockHtml='—';
    if(o.stock!==null){
      const cls=o.stock<=5?'danger':'';
      stockHtml=`<span class="stock-pill ${cls}">${fmt(o.stock)}</span>`;
    }
    if(isIn){
      const dayCells=days.map((d,i)=>{
        const v=(o.daily_inbound&&o.daily_inbound[d.key])||0;
        const latest=i===days.length-1;
        return `<td class="day-cell ${v===0?'zero':''} ${latest?'latest':''}">${v===0?'·':fmt(v)}</td>`;
      }).join('');
      tr.innerHTML=`
        <td class="left"><span class="sku-id">${o.sku_id}</span></td>
        <td class="left"><span class="sku-name" title="${escHtml(o.sku_name)}">${escHtml(o.sku_name)}</span></td>
        <td>${stockHtml}</td>
        ${dayCells}
        <td class="total-cell">${fmt(o.total_inbound||0)}</td>
      `;
      body.appendChild(tr);
    } else {
      const sum7=winKeys.reduce((s,k)=>s+(o.daily_units[k]||0),0);
      const avg7=sum7/winLen;
      const dayCells=days.map((d,i)=>{
        const v=o.daily_units[d.key]||0;
        const latest=i===days.length-1;
        return `<td class="day-cell ${v===0?'zero':''} ${latest?'latest':''}">${v===0?'·':fmt(v)}</td>`;
      }).join('');
      let daysLeftHtml='<span style="color:var(--text-3)">—</span>';
      if(o.stock!==null && avg7>0){
        daysLeftHtml=(o.stock/avg7).toFixed(1);
      } else if(o.stock!==null && avg7===0){
        daysLeftHtml='<span style="color:var(--text-3)">∞</span>';
      }
      tr.innerHTML=`
        <td class="left"><span class="chev">▶</span><span class="sku-id">${o.sku_id}</span></td>
        <td class="left"><span class="sku-name" title="${escHtml(o.sku_name)}">${escHtml(o.sku_name)}</span></td>
        <td>${stockHtml}</td>
        <td class="avg-cell">${daysLeftHtml}</td>
        <td class="avg-cell">${Math.round(o.avg14)}</td>
        <td class="avg-cell">${Math.round(avg7)}</td>
        ${dayCells}
        <td class="total-cell">${fmt(o.total_units)}</td>
      `;
      const dTr=document.createElement('tr'); dTr.className='detail-row';
      dTr.innerHTML=`<td colspan="${colCount}">${detailHTML(o,winKeys,winLen)}</td>`;
      tr.addEventListener('click',()=>{
        const open=tr.classList.toggle('expanded');
        dTr.classList.toggle('show',open);
      });
      body.appendChild(tr); body.appendChild(dTr);
    }
  });
  applyStickyCols();
}

function applyStickyCols(){
  const head=document.getElementById('mainHead');
  if(!head) return;
  const fixedN = state.tab==='in' ? 3 : 6;
  const ths=[...head.children].slice(0,fixedN);
  if(ths.length<fixedN) return;
  const widths=ths.map(th=>th.getBoundingClientRect().width);
  const lefts=[]; let acc=0;
  for(let i=0;i<widths.length;i++){ lefts.push(acc); acc+=widths[i]; }
  ths.forEach((th,i)=>{
    th.classList.add('sticky-col');
    th.style.left=lefts[i]+'px';
    th.classList.toggle('last-fixed', i===fixedN-1);
  });
  document.querySelectorAll('#mainBody tr.sku-row').forEach(tr=>{
    [...tr.children].slice(0,fixedN).forEach((td,i)=>{
      td.classList.add('sticky-col');
      td.style.left=lefts[i]+'px';
      td.classList.toggle('last-fixed', i===fixedN-1);
    });
  });
}
window.addEventListener('resize', ()=>{ if(document.getElementById('mainHead')) applyStickyCols(); });

function detailHTML(o,winKeys,winLen){
  const lastDay=state.allDays[state.allDays.length-1];
  const yesterdayUnits=o.daily_units[lastDay]||0;
  const cp=o.consumer_price||0;
  const last7=state.allDays.slice(-7);
  const units7=last7.reduce((s,d)=>s+(o.daily_units[d]||0),0);
  const avg7Units=units7/7;
  const dailyRevenue=cp*yesterdayUnits;
  const dailyAvgRevenue7=cp*avg7Units;
  const supplyHtml=cp ? fmtKRW(cp) : '<span class="empty">미입력</span>';
  const dailyRevHtml=cp ? fmtKRW(dailyRevenue) : '<span class="empty">—</span>';
  const dailyAvgHtml=cp ? fmtKRW(Math.round(dailyAvgRevenue7)) : '<span class="empty">—</span>';
  const monthRevHtml=o.total_revenue ? fmtKRW(o.total_revenue) : '<span class="empty">—</span>';
  return `
    <div class="detail-inner">
      <div class="detail-item"><div class="detail-label">상시가</div><div class="detail-value">${supplyHtml}</div></div>
      <div class="detail-item"><div class="detail-label">일매출액</div><div class="detail-value">${dailyRevHtml}</div></div>
      <div class="detail-item"><div class="detail-label">일평균 매출액 (7일)</div><div class="detail-value">${dailyAvgHtml}</div></div>
      <div class="detail-item"><div class="detail-label">월 총매출액</div><div class="detail-value">${monthRevHtml}</div></div>
    </div>
  `;
}
function escHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function bindSearch(){
  const input=document.getElementById('searchInput');
  const drop=document.getElementById('searchDrop');
  let activeIdx=-1;

  function buildOptions(q){
    const items=[...state.skuMap.values()];
    const ql=q.toLowerCase();
    const filtered=ql ? items.filter(o=>
      o.sku_id.toLowerCase().includes(ql) || (o.sku_name||'').toLowerCase().includes(ql)
    ) : items;
    return filtered.sort((a,b)=>b.total_units-a.total_units).slice(0,30);
  }
  function showDrop(q){
    const opts=buildOptions(q);
    if(!opts.length){ drop.classList.remove('show'); return; }
    drop.innerHTML=opts.map((o,i)=>
      `<div class="search-opt" data-sku="${o.sku_id}">
         <span class="id">${o.sku_id}</span>
         <span class="nm">${escHtml(o.sku_name)}</span>
       </div>`
    ).join('');
    drop.classList.add('show');
    activeIdx=-1;
    drop.querySelectorAll('.search-opt').forEach(el=>{
      el.onclick=()=>selectSku(el.dataset.sku, el.querySelector('.nm').textContent);
    });
  }
  function selectSku(id,nm){
    input.value=`${id} — ${nm}`;
    drop.classList.remove('show');
    const row=document.querySelector(`tr.sku-row[data-sku-id="${CSS.escape(id)}"]`);
    if(row){
      row.scrollIntoView({behavior:'smooth', block:'center'});
      if(!row.classList.contains('expanded')) row.click();
      row.style.outline='2px solid var(--accent)';
      setTimeout(()=>row.style.outline='', 1500);
    } else {
      // 카테고리 필터로 가려졌으면 전체로 전환
      state.category='all'; renderCategoryBar(); renderTable();
      setTimeout(()=>{
        const r=document.querySelector(`tr.sku-row[data-sku-id="${CSS.escape(id)}"]`);
        if(r){ r.scrollIntoView({behavior:'smooth', block:'center'}); r.click(); }
      },50);
    }
  }

  input.addEventListener('focus',()=>showDrop(input.value.trim()));
  input.addEventListener('input',()=>{
    showDrop(input.value.trim());
    // 라이브 필터 — 행 표시/숨김
    const q=input.value.trim().toLowerCase();
    document.querySelectorAll('tr.sku-row').forEach(tr=>{
      const show=!q || tr.textContent.toLowerCase().includes(q);
      tr.style.display=show?'':'none';
      const nx=tr.nextElementSibling;
      if(nx&&nx.classList.contains('detail-row'))
        nx.style.display=show&&tr.classList.contains('expanded')?'':'none';
    });
  });
  input.addEventListener('keydown',e=>{
    const opts=drop.querySelectorAll('.search-opt');
    if(!opts.length) return;
    if(e.key==='ArrowDown'){ e.preventDefault(); activeIdx=Math.min(activeIdx+1,opts.length-1); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); activeIdx=Math.max(activeIdx-1,0); }
    else if(e.key==='Enter' && activeIdx>=0){ e.preventDefault(); opts[activeIdx].click(); return; }
    else if(e.key==='Escape'){ drop.classList.remove('show'); return; }
    else return;
    opts.forEach(o=>o.classList.remove('active'));
    if(activeIdx>=0){ opts[activeIdx].classList.add('active'); opts[activeIdx].scrollIntoView({block:'nearest'}); }
  });
  document.addEventListener('click',e=>{
    if(!e.target.closest('.search-wrap')) drop.classList.remove('show');
  });
}

document.querySelectorAll('#tabBar .tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    state.tab=btn.dataset.tab;
    state.dateMode = (state.tab==='in') ? '14' : '7';
    document.querySelectorAll('#tabBar .tab-btn').forEach(b=>b.classList.toggle('active', b===btn));
    renderDateControls();
    renderTable();
  });
});
document.querySelectorAll('.date-mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    state.dateMode=btn.dataset.mode;
    renderDateControls(); renderTable();
  });
});
document.getElementById('customStart').addEventListener('change',e=>{
  if(e.target.value){ state.customStart=isoToYmd(e.target.value); renderDateControls(); renderTable(); }
});
document.getElementById('customEnd').addEventListener('change',e=>{
  if(e.target.value){ state.customEnd=isoToYmd(e.target.value); renderDateControls(); renderTable(); }
});

/* ===== Auto-load: GitHub의 같은 폴더에서 CSV/xlsx 직접 fetch ===== */
function parseMarginXlsx(buf){
  if(typeof XLSX==='undefined') return {};
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  const map={};
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; const sku=String(r[2]||'').trim();
    if(!sku) continue;
    const cat=String(r[1]||'').trim();
    const st=String(r[4]||'').trim();
    const supRaw=String(r[6]||'').replace(/[^\d\.\-]/g,'');
    const cpRaw=String(r[10]||'').replace(/[^\d\.\-]/g,'');
    map[sku]={s:parseFloat(supRaw)||0, c:cat, st:st, p:parseFloat(cpRaw)||0};
  }
  return map;
}
async function loadAll(){
  const bust='?t='+Date.now();  // 캐시 무효화
  try{
    const [dpText,boText,mgBuf]=await Promise.all([
      fetch('daily_performance.csv'+bust).then(r=>{if(!r.ok)throw new Error('daily_performance.csv 없음');return r.text();}),
      fetch('basic_operation_rocket.csv'+bust).then(r=>{if(!r.ok)throw new Error('basic_operation_rocket.csv 없음');return r.text();}),
      fetch('table.xlsx'+bust).then(r=>{if(!r.ok)throw new Error('table.xlsx 없음');return r.arrayBuffer();})
    ]);
    state.dpText=dpText;
    state.boText=boText;
    state.supplyMap=parseMarginXlsx(mgBuf);
    render();
  }catch(e){
    console.error('load failed',e);
    document.getElementById('mainBody').innerHTML=`<tr><td colspan="20"><div class="empty-state"><div class="ico">⚠️</div><h3>데이터 로딩 실패</h3><p>${e.message}</p></div></td></tr>`;
  }
}
document.addEventListener('DOMContentLoaded', loadAll);
